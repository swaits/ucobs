# Use nextest for faster test execution
test_tool = "nextest"

# Skip slow proptests during mutation testing — the 60+ unit/interop tests
# are sufficient to catch mutants. Full proptests run separately via just test-unit.
additional_cargo_test_args = ["-E", "not test(proptests)"]

# Excluded mutants (false positives only):
#
# - legacy-msrv const_copy: dead code under default features, only compiled
#   with --features legacy-msrv. Tested separately.
#
# - usize `> 0` → `>= 0` or `< 0`: tautological on usize (always >= 0).
#
# - `< 254` → `<= 254` in max_run: both branches yield 254 when remaining
#   is exactly 254, so the mutation is a semantic no-op.
exclude_re = [
    "in const_copy",
    "replace const_copy with \\(\\)",
    "replace > with < in encode",
    "replace > with >= in encode",
    "replace < with <= in encode",
]
